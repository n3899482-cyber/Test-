<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

</style>

<body>
<div id="mode-display">◈ VR SANDBOX ◈</div>
<div id="panel-hint">ТОРКНІТЬСЯ ЕКРАНУ — ПЕРЕМІЩУЙ | ТИСНИ ДОВГО — ПАНЕЛЬ ПРЕДМЕТІВ</div>

<canvas id="c"></canvas>
<div id="hud">
  <span id="hud-text">🕹️ ДОТИК: переміщати | ДОВГИЙ ДОТИК: панель | ПОДВІЙНИЙ ДОТИК: обертати</span>
</div>
<button id="vr-btn" onclick="toggleVR()">👓 VR РЕЖИМ</button>

<script>
// ═══════════════════════════════════════════════════════════
// THREE.JS VR SANDBOX — ПОВНА РЕАЛІЗАЦІЯ
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── Renderer ──
const gl = canvas.getContext('webgl', { antialias: true });
canvas.width = W(); canvas.height = H();

// ── State ──
let vrMode = false;
let objects = [];
let selectedObj = null;
let dragging = false;
let panelOpen = false;
let longPressTimer = null;
let rotation = { x: 0, y: 0 };
let lastTouch = null;
let animFrame = 0;
let gyroEnabled = false;
let gyroQ = { x: 0, y: 0, z: 0, w: 1 };

// ── Camera ──
const cam = {
  x: 0, y: 1.6, z: 5,
  rx: 0, ry: 0,
  fov: 75,
};

// ── Math utils ──
function mat4() { return new Float32Array(16); }
function identity(m) {
  m.fill(0); m[0]=m[5]=m[10]=m[15]=1; return m;
}
function perspective(m, fov, asp, near, far) {
  const f = 1 / Math.tan(fov * Math.PI / 360);
  m[0]=f/asp; m[1]=0; m[2]=0; m[3]=0;
  m[4]=0; m[5]=f; m[6]=0; m[7]=0;
  m[8]=0; m[9]=0; m[10]=(far+near)/(near-far); m[11]=-1;
  m[12]=0; m[13]=0; m[14]=(2*far*near)/(near-far); m[15]=0;
  return m;
}
function translate(m, tx, ty, tz) {
  const r = identity(mat4());
  r[12]=tx; r[13]=ty; r[14]=tz;
  return mul(r, m);
}
function rotateY(m, a) {
  const c=Math.cos(a), s=Math.sin(a);
  const r = identity(mat4());
  r[0]=c; r[2]=s; r[8]=-s; r[10]=c;
  return mul(r, m);
}
function rotateX(m, a) {
  const c=Math.cos(a), s=Math.sin(a);
  const r = identity(mat4());
  r[5]=c; r[6]=-s; r[9]=s; r[10]=c;
  return mul(r, m);
}
function scale(m, sx, sy, sz) {
  const r = identity(mat4());
  r[0]=sx; r[5]=sy; r[10]=sz;
  return mul(r, m);
}
function mul(a, b) {
  const r = mat4();
  for(let i=0;i<4;i++) for(let j=0;j<4;j++) {
    let s=0; for(let k=0;k<4;k++) s+=a[i*4+k]*b[k*4+j];
    r[i*4+j]=s;
  }
  return r;
}
function invert(out, m) {
  const a = m;
  const b00=a[0]*a[5]-a[1]*a[4], b01=a[0]*a[9]-a[2]*a[8];
  const b02=a[0]*a[13]-a[3]*a[12], b03=a[1]*a[9]-a[2]*a[5];
  const b04=a[1]*a[13]-a[3]*a[9], b05=a[2]*a[13]-a[3]*a[10];
  const b06=a[8]*a[13]-a[9]*a[12], b07=a[4]*a[13]-a[5]*a[12];
  const b08=a[4]*a[9]-a[5]*a[8], b09=a[0]*a[5]-a[1]*a[4];
  let det = b00*a[10]-b01*a[6]+b02*a[8]+b03*a[2]-b04*a[1]+b05*a[0];
  if(!det) return null;
  det = 1/det;
  // simplified invert for view matrix
  // Use transpose for rotation part
  out[0]=(a[5]*a[10]-a[6]*a[9])*det;
  out[1]=(a[2]*a[9]-a[1]*a[10])*det;
  out[2]=(a[1]*a[6]-a[2]*a[5])*det;
  out[3]=0;
  out[4]=(a[6]*a[8]-a[4]*a[10])*det;
  out[5]=(a[0]*a[10]-a[2]*a[8])*det;
  out[6]=(a[2]*a[4]-a[0]*a[6])*det;
  out[7]=0;
  out[8]=(a[4]*a[9]-a[5]*a[8])*det;
  out[9]=(a[1]*a[8]-a[0]*a[9])*det;
  out[10]=(a[0]*a[5]-a[1]*a[4])*det;
  out[11]=0;
  out[12]=-(out[0]*a[12]+out[4]*a[13]+out[8]*a[14]);
  out[13]=-(out[1]*a[12]+out[5]*a[13]+out[9]*a[14]);
  out[14]=-(out[2]*a[12]+out[6]*a[13]+out[10]*a[14]);
  out[15]=1;
  return out;
}

// ── WebGL Shaders ──
const vsSrc = `
  attribute vec3 aPos;
  attribute vec3 aNorm;
  attribute vec2 aUV;
  uniform mat4 uMVP;
  uniform mat4 uModel;
  varying vec3 vNorm;
  varying vec3 vPos;
  varying vec2 vUV;
  void main(){
    vNorm = (uModel * vec4(aNorm,0.0)).xyz;
    vPos  = (uModel * vec4(aPos,1.0)).xyz;
    vUV   = aUV;
    gl_Position = uMVP * vec4(aPos,1.0);
  }
`;
const fsSrc = `
  precision mediump float;
  varying vec3 vNorm;
  varying vec3 vPos;
  varying vec2 vUV;
  uniform vec3 uColor;
  uniform float uSelected;
  uniform float uTime;
  uniform vec3 uLightPos;
  void main(){
    vec3 N = normalize(vNorm);
    vec3 L = normalize(uLightPos - vPos);
    float diff = max(dot(N,L),0.0)*0.8 + 0.2;
    vec3 col = uColor * diff;
    if(uSelected > 0.5){
      float pulse = sin(uTime*4.0)*0.3+0.7;
      col += vec3(0.0,1.0,0.8)*0.3*pulse;
      col = mix(col, vec3(0.0,1.0,0.8), 0.15);
    }
    gl_FragColor = vec4(col,1.0);
  }
`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vsSrc));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsSrc));
gl.linkProgram(prog); gl.useProgram(prog);

const aPos  = gl.getAttribLocation(prog,'aPos');
const aNorm = gl.getAttribLocation(prog,'aNorm');
const aUV   = gl.getAttribLocation(prog,'aUV');
const uMVP  = gl.getUniformLocation(prog,'uMVP');
const uModel= gl.getUniformLocation(prog,'uModel');
const uColor= gl.getUniformLocation(prog,'uColor');
const uSel  = gl.getUniformLocation(prog,'uSelected');
const uTime = gl.getUniformLocation(prog,'uTime');
const uLight= gl.getUniformLocation(prog,'uLightPos');

// ── Geometry builders ──
function buildBox(sx=1,sy=1,sz=1) {
  const p=[], n=[], uv=[], idx=[];
  const faces=[
    [0,0,1],[0,0,-1],[0,1,0],[0,-1,0],[1,0,0],[-1,0,0]
  ];
  const up = [[0,1,0],[0,1,0],[0,0,-1],[0,0,1],[0,1,0],[0,1,0]];
  let base=0;
  faces.forEach((nrm,fi)=>{
    const nx=nrm[0],ny=nrm[1],nz=nrm[2];
    const ux=up[fi][0],uy=up[fi][1],uz=up[fi][2];
    const vx=ny*uz-nz*uy, vy=nz*ux-nx*uz, vz=nx*uy-ny*ux;
    for(let i=-1;i<=1;i+=2) for(let j=-1;j<=1;j+=2){
      p.push((nx+ux*i+vx*j)*sx/2,(ny+uy*i+vy*j)*sy/2,(nz+uz*i+vz*j)*sz/2);
      n.push(nx,ny,nz);
      uv.push((i+1)/2,(j+1)/2);
    }
    idx.push(base,base+1,base+2,base+1,base+3,base+2);
    base+=4;
  });
  return createMesh(p,n,uv,idx);
}

function buildSphere(r=0.5, segs=12) {
  const p=[],n=[],uv=[],idx=[];
  for(let y=0;y<=segs;y++){
    const v=y/segs, phi=v*Math.PI;
    for(let x=0;x<=segs;x++){
      const u=x/segs, th=u*Math.PI*2;
      const sx2=Math.sin(phi)*Math.cos(th);
      const sy2=Math.cos(phi);
      const sz2=Math.sin(phi)*Math.sin(th);
      p.push(sx2*r,sy2*r,sz2*r);
      n.push(sx2,sy2,sz2);
      uv.push(u,v);
    }
  }
  for(let y=0;y<segs;y++) for(let x=0;x<segs;x++){
    const a=y*(segs+1)+x;
    idx.push(a,a+1,a+segs+1,a+1,a+segs+2,a+segs+1);
  }
  return createMesh(p,n,uv,idx);
}

function buildCylinder(r=0.3,h=0.8,segs=12) {
  const p=[],n=[],uv=[],idx=[];
  // sides
  for(let i=0;i<=segs;i++){
    const a=i/segs*Math.PI*2;
    const cx=Math.cos(a)*r, cz=Math.sin(a)*r;
    p.push(cx,-h/2,cz, cx,h/2,cz);
    n.push(Math.cos(a),0,Math.sin(a), Math.cos(a),0,Math.sin(a));
    uv.push(i/segs,0, i/segs,1);
  }
  for(let i=0;i<segs;i++){
    const b=i*2;
    idx.push(b,b+1,b+2, b+1,b+3,b+2);
  }
  return createMesh(p,n,uv,idx);
}

function buildPyramid() {
  const h=1, r=0.5;
  const segs=4;
  const p=[],n=[],uv=[],idx=[];
  // base
  const tip=[0,h/2,0];
  for(let i=0;i<segs;i++){
    const a0=i/segs*Math.PI*2, a1=(i+1)/segs*Math.PI*2;
    const x0=Math.cos(a0)*r,z0=Math.sin(a0)*r;
    const x1=Math.cos(a1)*r,z1=Math.sin(a1)*r;
    p.push(x0,-h/2,z0, x1,-h/2,z1, 0,h/2,0);
    const nx=(z1-z0), nz=-(x1-x0);
    n.push(nx,0.5,nz, nx,0.5,nz, nx,0.5,nz);
    uv.push(0,0,1,0,0.5,1);
    const b=i*3;
    idx.push(b,b+1,b+2);
  }
  return createMesh(p,n,uv,idx);
}

function buildTorus(R=0.4, r=0.15, segs=16, rings=24) {
  const p=[],n=[],uv=[],idx=[];
  for(let j=0;j<=rings;j++){
    const v=j/rings, phi=v*Math.PI*2;
    for(let i=0;i<=segs;i++){
      const u=i/segs, theta=u*Math.PI*2;
      const cx=(R+r*Math.cos(theta))*Math.cos(phi);
      const cy=r*Math.sin(theta);
      const cz=(R+r*Math.cos(theta))*Math.sin(phi);
      p.push(cx,cy,cz);
      n.push(Math.cos(theta)*Math.cos(phi),Math.sin(theta),Math.cos(theta)*Math.sin(phi));
      uv.push(u,v);
    }
  }
  for(let j=0;j<rings;j++) for(let i=0;i<segs;i++){
    const a=j*(segs+1)+i;
    idx.push(a,a+1,a+segs+1, a+1,a+segs+2,a+segs+1);
  }
  return createMesh(p,n,uv,idx);
}

function createMesh(positions,normals,uvs,indices){
  const pb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,pb);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(positions),gl.STATIC_DRAW);
  const nb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,nb);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(normals),gl.STATIC_DRAW);
  const ub=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,ub);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(uvs),gl.STATIC_DRAW);
  const ib=gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(indices),gl.STATIC_DRAW);
  return { pb,nb,ub,ib, count:indices.length };
}

// ── Meshes ──
const meshes = {
  box:      buildBox(0.6,0.6,0.6),
  sphere:   buildSphere(0.35),
  cylinder: buildCylinder(0.25,0.7),
  pyramid:  buildPyramid(),
  torus:    buildTorus(),
  flatBox:  buildBox(0.8,0.1,0.8),
};

// ── Scene Objects ──
function createObject(type, x, y, z, color) {
  return { type, x, y, z, color, rx:0, ry:Math.random()*Math.PI*2, rz:0, selected:false, scale:1.0, id:Math.random() };
}

objects = [
  createObject('box',     -1.5, 0.5, -2, [0.9,0.3,0.2]),
  createObject('sphere',   0.5, 0.5, -2, [0.2,0.6,0.9]),
  createObject('cylinder', 1.8, 0.5, -2, [0.3,0.9,0.4]),
  createObject('pyramid', -0.5, 0.5, -3, [0.9,0.7,0.1]),
  createObject('torus',    1.0, 0.5, -3, [0.8,0.3,0.9]),
  createObject('flatBox',  0.0, 0.0, -2, [0.3,0.3,0.4]),
];

// ── Panel objects catalog ──
const catalog = [
  { type:'box',      label:'📦 КУБ',     color:[0.9,0.4,0.2] },
  { type:'sphere',   label:'🔵 КУЛЯ',    color:[0.2,0.5,0.9] },
  { type:'cylinder', label:'🔷 ЦИЛІНДР', color:[0.2,0.8,0.4] },
  { type:'pyramid',  label:'🔺 ПІРАМІДА',color:[0.9,0.8,0.1] },
  { type:'torus',    label:'⭕ ТОРОЇД',  color:[0.7,0.2,0.9] },
  { type:'flatBox',  label:'🟫 ПЛИТА',   color:[0.5,0.5,0.6] },
];

// ── Draw ──
function drawMesh(mesh, model, color, selected) {
  const mvp = mul(mul(getProjMat(), getViewMat()), model);
  gl.uniformMatrix4fv(uMVP, false, mvp);
  gl.uniformMatrix4fv(uModel, false, model);
  gl.uniform3fv(uColor, color);
  gl.uniform1f(uSel, selected ? 1 : 0);
  gl.uniform1f(uTime, animFrame * 0.016);
  gl.uniform3f(uLight, 3, 5, 3);

  gl.bindBuffer(gl.ARRAY_BUFFER, mesh.pb);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, mesh.nb);
  gl.enableVertexAttribArray(aNorm);
  gl.vertexAttribPointer(aNorm, 3, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, mesh.ub);
  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.ib);
  gl.drawElements(gl.TRIANGLES, mesh.count, gl.UNSIGNED_SHORT, 0);
}

function getProjMat() {
  const asp = vrMode ? (W()/2)/H() : W()/H();
  return perspective(mat4(), cam.fov, asp, 0.1, 100);
}

function getViewMat() {
  let m = identity(mat4());
  m = rotateX(m, cam.rx);
  m = rotateY(m, cam.ry);
  m = translate(m, -cam.x, -cam.y, -cam.z);
  return m;
}

function drawScene(eyeOffset=0) {
  gl.clearColor(0.02, 0.04, 0.08, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // Override proj with eye offset for VR
  const asp = vrMode ? (W()/2)/H() : W()/H();
  const proj = perspective(mat4(), cam.fov, asp, 0.1, 100);
  const view = getViewMat();

  // Draw floor grid
  drawGrid(proj, view, eyeOffset);

  // Draw objects
  objects.forEach(obj => {
    let m = identity(mat4());
    m = translate(m, obj.x + eyeOffset, obj.y, obj.z);
    m = rotateY(m, obj.ry);
    m = rotateX(m, obj.rx);
    const sc = obj.scale;
    m = scale(m, sc, sc, sc);

    const mesh = meshes[obj.type] || meshes.box;
    const mvp = mul(mul(proj, view), m);
    gl.uniformMatrix4fv(uMVP, false, mvp);
    gl.uniformMatrix4fv(uModel, false, m);
    gl.uniform3fv(uColor, obj.color);
    gl.uniform1f(uSel, obj.selected ? 1 : 0);
    gl.uniform1f(uTime, animFrame * 0.016);
    gl.uniform3f(uLight, 3+eyeOffset, 5, 3);

    gl.bindBuffer(gl.ARRAY_BUFFER, mesh.pb);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ARRAY_BUFFER, mesh.nb);
    gl.enableVertexAttribArray(aNorm);
    gl.vertexAttribPointer(aNorm, 3, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ARRAY_BUFFER, mesh.ub);
    gl.enableVertexAttribArray(aUV);
    gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.ib);
    gl.drawElements(gl.TRIANGLES, mesh.count, gl.UNSIGNED_SHORT, 0);

    // Auto-rotate selected
    if (obj.selected) obj.ry += 0.02;
  });
}

// ── Grid ──
const gridVerts = [];
for(let i=-5;i<=5;i++){
  gridVerts.push(i, 0, -5, i, 0, 5);
  gridVerts.push(-5, 0, i, 5, 0, i);
}
const gridBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, gridBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(gridVerts), gl.STATIC_DRAW);

const gridVsSrc = `
  attribute vec3 aPos;
  uniform mat4 uMVP;
  void main(){ gl_Position = uMVP * vec4(aPos,1.0); }
`;
const gridFsSrc = `
  precision mediump float;
  void main(){ gl_FragColor = vec4(0.0,1.0,0.8,0.15); }
`;
const gridProg = gl.createProgram();
gl.attachShader(gridProg, compileShader(gl.VERTEX_SHADER, gridVsSrc));
gl.attachShader(gridProg, compileShader(gl.FRAGMENT_SHADER, gridFsSrc));
gl.linkProgram(gridProg);

function drawGrid(proj, view, eyeOff=0) {
  gl.useProgram(gridProg);
  const m = translate(identity(mat4()), eyeOff, 0, 0);
  const mvp = mul(mul(proj, view), m);
  gl.uniformMatrix4fv(gl.getUniformLocation(gridProg,'uMVP'), false, mvp);
  gl.bindBuffer(gl.ARRAY_BUFFER, gridBuf);
  const ap = gl.getAttribLocation(gridProg,'aPos');
  gl.enableVertexAttribArray(ap);
  gl.vertexAttribPointer(ap, 3, gl.FLOAT, false, 0, 0);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.drawArrays(gl.LINES, 0, gridVerts.length/3);
  gl.disable(gl.BLEND);
  gl.useProgram(prog);
}

// ── Crosshair canvas overlay ──
function drawCrosshair() {
  if (!vrMode) return;
  const ctx2 = crossCanvas.getContext('2d');
  ctx2.clearRect(0,0,crossCanvas.width,crossCanvas.height);
  const cx = crossCanvas.width/2, cy = crossCanvas.height/2;
  ctx2.strokeStyle = 'rgba(0,255,200,0.8)';
  ctx2.lineWidth = 2;
  ctx2.beginPath();
  ctx2.moveTo(cx-15,cy); ctx2.lineTo(cx+15,cy);
  ctx2.moveTo(cx,cy-15); ctx2.lineTo(cx,cy+15);
  ctx2.stroke();
  ctx2.beginPath();
  ctx2.arc(cx,cy,5,0,Math.PI*2);
  ctx2.stroke();
  // Divider
  ctx2.strokeStyle='rgba(0,255,200,0.3)';
  ctx2.lineWidth=1;
  ctx2.beginPath();
  ctx2.moveTo(cx,0); ctx2.lineTo(cx,crossCanvas.height);
  ctx2.stroke();
}

const crossCanvas = document.createElement('canvas');
crossCanvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15';
document.body.appendChild(crossCanvas);

// ── Render loop ──
function render() {
  animFrame++;
  canvas.width = W(); canvas.height = H();
  crossCanvas.width = W(); crossCanvas.height = H();
  gl.viewport(0,0,W(),H());
  gl.enable(gl.DEPTH_TEST);

  if (vrMode) {
    // Left eye
    gl.viewport(0, 0, W()/2, H());
    drawScene(-0.032);
    // Right eye
    gl.viewport(W()/2, 0, W()/2, H());
    drawScene(0.032);
    drawCrosshair();
  } else {
    gl.viewport(0, 0, W(), H());
    drawScene(0);
  }

  // Auto-rotate non-selected objects slightly
  objects.forEach(o => {
    if (!o.selected) o.ry += 0.003;
  });

  requestAnimationFrame(render);
}

render();

// ── VR Toggle ──
function toggleVR() {
  vrMode = !vrMode;
  const btn = document.getElementById('vr-btn');
  const hint = document.getElementById('panel-hint');
  if (vrMode) {
    btn.textContent = '📱 ЗВИЧАЙНИЙ РЕЖИМ';
    btn.style.background = 'linear-gradient(135deg,#ff4060,#ff8000)';
    hint.textContent = 'VR РЕЖИМ: Нахиляй телефон для огляду | Засунь в окуляри';
    document.getElementById('mode-display').textContent = '◈ VR РЕЖИМ АКТИВНИЙ ◈';
    enableGyro();
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    screen.orientation && screen.orientation.lock && screen.orientation.lock('landscape');
  } else {
    btn.textContent = '👓 VR РЕЖИМ';
    btn.style.background = 'linear-gradient(135deg,#00ffc8,#0080ff)';
    hint.textContent = 'ТОРКНІТЬСЯ ЕКРАНУ — ПЕРЕМІЩУЙ | ТИСНИ ДОВГО — ПАНЕЛЬ ПРЕДМЕТІВ';
    document.getElementById('mode-display').textContent = '◈ VR SANDBOX ◈';
  }
}

// ── Gyroscope ──
function enableGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') listenGyro();
    });
  } else {
    listenGyro();
  }
}
function listenGyro() {
  window.addEventListener('deviceorientation', e => {
    if (!vrMode) return;
    cam.rx = (e.beta - 90) * Math.PI / 180;
    cam.ry = -e.gamma * Math.PI / 180;
  });
}

// ── Touch Controls ──
let touchStart = null;
let touchStartTime = 0;
let lastTouchX = 0, lastTouchY = 0;
let pinchDist = 0;
let doubleTapTimer = null;
let tapCount = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
  lastTouchX = t.clientX; lastTouchY = t.clientY;
  touchStartTime = Date.now();

  // Long press = open panel
  longPressTimer = setTimeout(() => {
    openPanel();
  }, 600);

  // Double tap
  tapCount++;
  if (tapCount === 1) {
    doubleTapTimer = setTimeout(() => {
      if (tapCount === 1) {
        // Single tap = select object at center
        selectAtCenter();
      }
      tapCount = 0;
    }, 300);
  } else if (tapCount === 2) {
    clearTimeout(doubleTapTimer);
    tapCount = 0;
    // Double tap = throw/toss selected
    if (selectedObj) throwObject();
  }

  // Pinch
  if (e.touches.length === 2) {
    clearTimeout(longPressTimer);
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  clearTimeout(longPressTimer);

  if (e.touches.length === 2) {
    // Pinch = scale selected
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (selectedObj && pinchDist > 0) {
      selectedObj.scale = Math.max(0.2, Math.min(3, selectedObj.scale * (dist/pinchDist)));
    }
    pinchDist = dist;
    return;
  }

  const t = e.touches[0];
  const dx = t.clientX - lastTouchX;
  const dy = t.clientY - lastTouchY;
  lastTouchX = t.clientX; lastTouchY = t.clientY;

  if (selectedObj) {
    // Move selected object
    selectedObj.x += dx * 0.008;
    selectedObj.y -= dy * 0.008;
    showGestureHint('☝️ ПЕРЕМІЩЕННЯ');
  } else {
    // Rotate camera
    cam.ry -= dx * 0.003;
    cam.rx -= dy * 0.003;
    cam.rx = Math.max(-Math.PI/2, Math.min(Math.PI/2, cam.rx));
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  clearTimeout(longPressTimer);
  dragging = false;
}, { passive: false });

// ── Select object at screen center ──
function selectAtCenter() {
  // Ray from camera through center of screen
  const ry = cam.ry, rx = cam.rx;
  const rdx = Math.sin(ry)*Math.cos(rx);
  const rdy = -Math.sin(rx);
  const rdz = -Math.cos(ry)*Math.cos(rx);

  let closest = null, minDist = Infinity;
  objects.forEach(obj => {
    const ex = obj.x - cam.x, ey = obj.y - cam.y, ez = obj.z - cam.z;
    const t = ex*rdx + ey*rdy + ez*rdz;
    if (t < 0) return;
    const px = cam.x + rdx*t, py = cam.y + rdy*t, pz = cam.z + rdz*t;
    const d = Math.sqrt((px-obj.x)**2+(py-obj.y)**2+(pz-obj.z)**2);
    if (d < 0.8 && t < minDist) { minDist=t; closest=obj; }
  });

  objects.forEach(o => o.selected = false);
  selectedObj = closest;
  if (closest) {
    closest.selected = true;
    showGestureHint('✅ ВИБРАНО: ' + closest.type.toUpperCase());
  }
}

function throwObject() {
  if (!selectedObj) return;
  const ry = cam.ry;
  selectedObj.x += Math.sin(ry)*2;
  selectedObj.z -= Math.cos(ry)*2;
  showGestureHint('💨 КИНУТО!');
  selectedObj.selected = false;
  selectedObj = null;
}

// ── Gesture hint display ──
function showGestureHint(txt) {
  const el = document.getElementById('gesture-info');
  el.textContent = txt;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 1500);
}

// ── Panel UI ──
let panelEl = null;
function openPanel() {
  if (panelOpen) { closePanel(); return; }
  panelOpen = true;
  showGestureHint('✋ ПАНЕЛЬ ВІДКРИТА');

  panelEl = document.createElement('div');
  panelEl.style.cssText = `
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    background:rgba(0,10,20,0.92); border:1px solid rgba(0,255,200,0.4);
    backdrop-filter:blur(20px); border-radius:20px;
    padding:24px; z-index:100; min-width:300px;
    box-shadow:0 0 60px rgba(0,255,200,0.2);
  `;
  panelEl.innerHTML = `
    <div style="color:#00ffc8;font-size:14px;letter-spacing:3px;margin-bottom:18px;text-align:center;">
      ✋ ПАНЕЛЬ ПРЕДМЕТІВ
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      ${catalog.map((c,i)=>`
        <button onclick="spawnObject(${i})" style="
          background:rgba(${Math.round(c.color[0]*80)},${Math.round(c.color[1]*80)},${Math.round(c.color[2]*80)},0.3);
          border:1px solid rgba(${Math.round(c.color[0]*255)},${Math.round(c.color[1]*255)},${Math.round(c.color[2]*255)},0.5);
          border-radius:12px; padding:14px 10px; color:#fff; font-size:13px;
          cursor:pointer; letter-spacing:1px; transition:all 0.2s;
        " onmouseover="this.style.background='rgba(${Math.round(c.color[0]*120)},${Math.round(c.color[1]*120)},${Math.round(c.color[2]*120)},0.6)'"
           onmouseout="this.style.background='rgba(${Math.round(c.color[0]*80)},${Math.round(c.color[1]*80)},${Math.round(c.color[2]*80)},0.3)'">
          ${c.label}
        </button>
      `).join('')}
    </div>
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button onclick="clearAll()" style="background:rgba(255,50,50,0.2);border:1px solid rgba(255,50,50,0.4);border-radius:12px;padding:10px;color:#ff5555;cursor:pointer;letter-spacing:2px;font-size:11px;">
        🗑️ ОЧИСТИТИ
      </button>
      <button onclick="closePanel()" style="background:rgba(0,255,200,0.1);border:1px solid rgba(0,255,200,0.3);border-radius:12px;padding:10px;color:#00ffc8;cursor:pointer;letter-spacing:2px;font-size:11px;">
        ✕ ЗАКРИТИ
      </button>
    </div>
    <div style="margin-top:14px;color:rgba(255,255,255,0.35);font-size:10px;text-align:center;letter-spacing:1px;line-height:1.6;">
      1 ПАЛЕЦЬ: переміщати об'єкт | 2 ПАЛЬЦІ: масштаб<br>
      ПОДВІЙНИЙ ТАП: кинути об'єкт | ДОВГИЙ ТАП: ця панель
    </div>
  `;
  document.body.appendChild(panelEl);
}

function closePanel() {
  panelOpen = false;
  if (panelEl) { panelEl.remove(); panelEl = null; }
}

function spawnObject(idx) {
  const c = catalog[idx];
  const ry = cam.ry;
  const nx = cam.x + Math.sin(ry) * -2;
  const nz = cam.z + Math.cos(ry) * 2;
  const obj = createObject(c.type, nx, cam.y, nz, c.color);
  objects.push(obj);
  objects.forEach(o => o.selected = false);
  selectedObj = obj;
  obj.selected = true;
  closePanel();
  showGestureHint('✨ ДОДАНО: ' + c.type.toUpperCase());
}

function clearAll() {
  objects = [createObject('flatBox', 0, 0, -2, [0.3,0.3,0.4])];
  selectedObj = null;
  closePanel();
  showGestureHint('🗑️ ОЧИЩЕНО!');
}

// ── Keyboard (desktop fallback) ──
window.addEventListener('keydown', e => {
  const sp = 0.1;
  const ry = cam.ry;
  if(e.key==='ArrowUp'||e.key==='w')    { cam.x+=Math.sin(ry)*sp; cam.z-=Math.cos(ry)*sp; }
  if(e.key==='ArrowDown'||e.key==='s')  { cam.x-=Math.sin(ry)*sp; cam.z+=Math.cos(ry)*sp; }
  if(e.key==='ArrowLeft'||e.key==='a')  { cam.ry += 0.05; }
  if(e.key==='ArrowRight'||e.key==='d') { cam.ry -= 0.05; }
  if(e.key==='q') cam.y += sp;
  if(e.key==='e') cam.y -= sp;
  if(e.key==='p') openPanel();
  if(e.key==='v') toggleVR();
  if(e.key==='Escape') { closePanel(); if(selectedObj) {selectedObj.selected=false;selectedObj=null;} }
  if(e.key===' ') selectAtCenter();

  if(selectedObj){
    if(e.key==='r') selectedObj.ry+=0.1;
    if(e.key==='t') selectedObj.rx+=0.1;
  }
});

// Desktop mouse for PC preview
let mouseDown=false, lastMX=0, lastMY=0;
canvas.addEventListener('mousedown',e=>{mouseDown=true;lastMX=e.clientX;lastMY=e.clientY;});
canvas.addEventListener('mouseup',()=>mouseDown=false);
canvas.addEventListener('mousemove',e=>{
  if(!mouseDown)return;
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  lastMX=e.clientX; lastMY=e.clientY;
  if(selectedObj){ selectedObj.x+=dx*0.005; selectedObj.y-=dy*0.005; }
  else { cam.ry-=dx*0.003; cam.rx-=dy*0.003; }
});
canvas.addEventListener('click', ()=>{ selectAtCenter(); });
canvas.addEventListener('contextmenu', e=>{ e.preventDefault(); openPanel(); });

// ── Resize ──
window.addEventListener('resize',()=>{ canvas.width=W(); canvas.height=H(); });

</script>
